name: Package and Release Skill

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'  # 监听以 v 开头的 tag 推送 (例如 v1.0.0)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Skill Package
        run: |
          # Whitelist-only packaging: do NOT include LICENSE, CONTRIBUTING.md,
          # or any .github/ metadata. ClawHub defaults to MIT-0, and the registry
          # validates the package contents against the skill manifest.
          zip -q -r linux-kernel-crash-debug.skill SKILL.md SKILL_CN.md scripts/ references/

      - name: Create Clean Source Archive
        env:
          # GITHUB_REF is server-injected (e.g. "refs/tags/v1.3.1") and not
          # attacker-controllable, but we still pass it via env to keep the
          # shell-quoted expansion explicit.
          GITHUB_REF: ${{ github.ref }}
        run: |
          # Build a clean source zip that mirrors the auto-generated
          # "Source code (zip)" asset on the Release page, but with
          # repository metadata excluded via .gitattributes (export-ignore).
          # This ensures the user-facing download does not contain
          # .github/, .gitignore, LICENSE, CONTRIBUTING.md, etc.
          TAG="${GITHUB_REF#refs/tags/}"
          git archive --format=zip \
            --prefix="linux-kernel-crash-debug-${TAG}/" \
            -o "linux-kernel-crash-debug-${TAG}.zip" HEAD

      - name: Verify Clean Source Archive
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          # Defence-in-depth: even though .gitattributes drives the
          # exclusion, a typo there could silently leak metadata. This
          # step fails the build if any forbidden path appears in the
          # archive. Keep this list in sync with .gitattributes.
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="linux-kernel-crash-debug-${TAG}.zip"
          FORBIDDEN='\.gitignore$|^\.github/|\.agents/|^[^/]*/LICENSE$|^[^/]*/CONTRIBUTING\.md$|^[^/]*/CHANGELOG\.md$|^[^/]*/CLAUDE\.md$|^[^/]*/README\.md$|^[^/]*/README_CN\.md$'
          echo "==> Listing files in ${ARCHIVE}:"
          unzip -Z1 "${ARCHIVE}" | sort
          echo ""
          echo "==> Checking for forbidden paths..."
          if LEAKS=$(unzip -Z1 "${ARCHIVE}" | grep -E "${FORBIDDEN}" || true); [ -n "${LEAKS}" ]; then
            echo "ERROR: forbidden paths found in source archive:" >&2
            echo "${LEAKS}" >&2
            echo "" >&2
            echo "These paths must be marked 'export-ignore' in .gitattributes." >&2
            exit 1
          fi
          echo "OK: no forbidden paths in ${ARCHIVE}"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            linux-kernel-crash-debug.skill
            linux-kernel-crash-debug-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
